<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPC Tournament Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1a237e;
            --navy-dark: #0d1b3a;
            --gold: #d4af37;
            --orange: #ff6b35;
            --white: #ffffff;
            --gray: rgba(255,255,255,0.7);
            --green: #00ff88;
            --red: #ff3366;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, var(--navy) 0%, var(--navy-dark) 100%);
            color: var(--white);
            min-height: 100vh;
            position: relative;
        }

        /* Fundo estrelas */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: twinkle 4s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Header */
        .header {
            background: rgba(26, 35, 126, 0.4);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tournament-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--orange);
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
            cursor: pointer;
        }

        .tournament-info {
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .logo-chip {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold), #8b7d2e, var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            background: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--gold);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--gold);
        }

        /* Tabs */
        .tabs {
            background: rgba(26, 35, 126, 0.2);
            backdrop-filter: blur(10px);
            padding: 0 20px;
        }

        .tab-nav {
            display: flex;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--gray);
            padding: 15px 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .tab-btn:hover {
            color: var(--white);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 140px);
        }

        .tab-content.active {
            display: block;
        }

        /* Timer Tab */
        .timer-layout {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            height: calc(100vh - 160px);
        }

        .timer-side {
            background: rgba(26, 35, 126, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
        }

        .timer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Timer Info Top */
        .timer-info-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: var(--gray);
        }

        .total-time, .break-time {
            background: rgba(26, 35, 126, 0.3);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .total-time span, .break-time span {
            color: var(--gold);
            font-weight: 700;
        }

        /* Main Timer */
        .main-timer {
            font-family: 'Orbitron', monospace;
            font-size: 8rem;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 0 0 40px rgba(255, 107, 53, 0.8);
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .main-timer.warning {
            color: var(--red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-container {
            width: 80%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--gold));
            border-radius: 10px;
            transition: width 1s linear;
        }

        /* Timer Controls */
        .timer-controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .control-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1rem;
        }

        .control-btn:hover {
            background: var(--gold);
            color: var(--navy);
            transform: translateY(-2px);
        }

        .control-btn.play {
            background: rgba(255, 107, 53, 0.2);
            border-color: var(--orange);
            color: var(--orange);
            padding: 15px 35px;
            font-size: 1.1rem;
        }

        .control-btn.play:hover {
            background: var(--orange);
            color: white;
        }

        /* Left Side - Players & Structure */
        .side-title {
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
        }

        .players-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .players-count {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--white);
            margin: 10px 0;
            cursor: pointer;
        }

        .players-count:hover {
            color: var(--gold);
        }

        .avg-stack {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .stack-value {
            color: var(--gold);
            font-weight: 700;
        }

        .next-levels {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .next-level-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            border: 1px solid transparent;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .next-level-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .next-level-item.current {
            background: rgba(255, 107, 53, 0.2);
            border-color: var(--orange);
            font-weight: 600;
        }

        .next-level-item.break {
            background: rgba(0, 255, 136, 0.1);
            color: var(--green);
            font-style: italic;
        }

        .level-num {
            color: var(--orange);
            font-weight: 700;
            width: 30px;
        }

        .level-blinds {
            color: var(--white);
            flex: 1;
            text-align: center;
            font-family: 'Orbitron', monospace;
        }

        .level-time {
            color: var(--gray);
            font-size: 0.8rem;
        }

        /* Right Side - Blinds */
        .blinds-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            justify-content: center;
        }

        .blind-display {
            background: rgba(26, 35, 126, 0.4);
            border: 2px solid rgba(212, 175, 55, 0.4);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .blind-label {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .blind-value {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            color: var(--white);
        }

        .ante-section {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }

        .ante-section .blind-value {
            color: var(--gold);
            font-size: 2rem;
        }

        .ante-input {
            background: transparent;
            border: none;
            color: var(--gold);
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .ante-input:focus {
            outline: 1px solid var(--gold);
            border-radius: 5px;
        }

        /* Config Tab */
        .config-section {
            background: rgba(26, 35, 126, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .section-title {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .structure-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .structure-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .structure-btn:hover {
            background: var(--gold);
            color: var(--navy);
        }

        .structure-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .structure-item {
            background: rgba(26, 35, 126, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .structure-item.break {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--green);
        }

        .structure-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .remove-btn {
            background: var(--red);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .remove-btn:hover {
            background: #cc2952;
        }

        .break-indicator {
            color: var(--green);
            font-weight: 700;
            font-style: italic;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Tournament Tab */
        .tournament-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .payout-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .payout-item {
            display: grid;
            grid-template-columns: 60px 80px 1fr 60px;
            gap: 10px;
            align-items: center;
            padding: 12px;
            background: rgba(26, 35, 126, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .payout-pos {
            color: var(--gold);
            font-weight: 700;
            text-align: center;
        }

        .payout-percent {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            padding: 8px;
            border-radius: 5px;
            text-align: center;
        }

        .payout-percent:focus {
            outline: none;
            border-color: var(--gold);
        }

        .payout-value {
            color: var(--gold);
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            text-align: center;
        }

        .total-prize {
            text-align: center;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .total-prize-value {
            color: var(--gold);
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .timer-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                gap: 15px;
            }
            
            .timer-side {
                max-height: 300px;
            }
            
            .main-timer {
                font-size: 5rem;
            }
            
            .structure-form {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-timer {
                font-size: 4rem;
            }
            
            .timer-info-top {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }
            
            .tab-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
            
            .tournament-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="header">
        <div class="header-content">
            <div class="logo-chip">
                <div class="logo-inner">FPC</div>
            </div>
            <div class="tournament-title" onclick="editTournamentName()">NOITE DOS FUNDADORES</div>
            <div class="tournament-info" id="tournamentInfo">Buy-in: R$ 60 | 16 Jogadores</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('timer')">📺 TIMER</button>
            <button class="tab-btn" onclick="switchTab('config')">⚙️ CONFIGURAÇÕES</button>
            <button class="tab-btn" onclick="switchTab('tournament')">🏆 TORNEIO</button>
        </div>
    </div>

    <!-- Timer Tab -->
    <div class="tab-content active" id="timer-tab">
        <div class="timer-layout">
            <!-- Left Side -->
            <div class="timer-side">
                <div class="side-title">Jogadores</div>
                <div class="players-section">
                    <div class="players-count" onclick="editPlayers()">
                        <span id="activePlayers">16</span>/<span id="totalPlayers">16</span>
                    </div>
                    <div class="avg-stack">
                        PILHA MÉDIA: <span class="stack-value" id="avgStack">5000</span>
                    </div>
                </div>

                <div class="side-title">Próximos Níveis</div>
                <ul class="next-levels" id="nextLevels">
                    <!-- Preenchido via JavaScript -->
                </ul>
            </div>

            <!-- Center -->
            <div class="timer-center">
                <div class="timer-info-top">
                    <div class="total-time">
                        Total: <span id="totalTimer">2:12:47</span>
                    </div>
                    <div class="break-time">
                        Próximo intervalo: <span id="breakTimer">3 níveis (45 min)</span>
                    </div>
                </div>

                <div class="main-timer" id="mainTimer">12:47</div>
                
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 65%;"></div>
                </div>

                <div class="timer-controls">
                    <button class="control-btn" onclick="prevLevel()">⏮</button>
                    <button class="control-btn" onclick="adjustTime(-60)">-1m</button>
                    <button class="control-btn play" id="playBtn" onclick="toggleTimer()">▶ Iniciar</button>
                    <button class="control-btn" onclick="adjustTime(60)">+1m</button>
                    <button class="control-btn" onclick="nextLevel()">⏭</button>
                </div>
            </div>

            <!-- Right Side -->
            <div class="timer-side">
                <div class="side-title">Blinds Atuais</div>
                <div class="blinds-section">
                    <div class="blind-display">
                        <div class="blind-label">Small Blind</div>
                        <div class="blind-value" id="currentSB">25</div>
                    </div>
                    
                    <div class="blind-display">
                        <div class="blind-label">Big Blind</div>
                        <div class="blind-value" id="currentBB">50</div>
                    </div>
                    
                    <div class="blind-display ante-section">
                        <div class="blind-label">Ante (opcional)</div>
                        <input type="number" class="ante-input" id="currentAnte" value="0" min="0" onchange="updateCurrentAnte(this.value)" placeholder="0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Config Tab -->
    <div class="tab-content" id="config-tab">
        <div class="config-section">
            <div class="section-title">Estrutura de Blinds</div>
            
            <div class="structure-controls">
                <button class="structure-btn" onclick="addLevel()">+ Adicionar Nível</button>
                <button class="structure-btn" onclick="addBreak()">+ Adicionar Intervalo</button>
                <button class="structure-btn" onclick="resetStructure()">🔄 Resetar</button>
                <button class="structure-btn" onclick="saveStructure()">💾 Salvar</button>
            </div>

            <div class="structure-list" id="structureList">
                <!-- Preenchido via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Tournament Tab -->
    <div class="tab-content" id="tournament-tab">
        <div class="tournament-grid">
            <div class="config-section">
                <div class="section-title">Configurações do Torneio</div>
                
                <div class="form-group">
                    <label class="form-label">Nome do Torneio</label>
                    <input type="text" class="form-input" id="tournamentNameInput" value="NOITE DOS FUNDADORES" onchange="updateTournamentName()">
                </div>

                <div class="form-group">
                    <label class="form-label">Total de Jogadores</label>
                    <input type="number" class="form-input" id="totalPlayersInput" value="16" min="2" onchange="updateTournamentSettings()">
                </div>

                <div class="form-group">
                    <label class="form-label">Jogadores Eliminados</label>
                    <input type="number" class="form-input" id="eliminatedInput" value="0" min="0" onchange="updateTournamentSettings()">
                </div>

                <div class="form-group">
                    <label class="form-label">Buy-in (R$)</label>
                    <input type="number" class="form-input" id="buyinInput" value="60" min="0" onchange="updateTournamentSettings()">
                </div>

                <div class="form-group">
                    <label class="form-label">Fichas Iniciais</label>
                    <input type="number" class="form-input" id="startingChipsInput" value="5000" min="1000" onchange="updateTournamentSettings()">
                </div>

                <div class="form-group">
                    <label class="form-label">Taxa (R$) - Opcional</label>
                    <input type="number" class="form-input" id="feeInput" value="0" min="0" onchange="updateTournamentSettings()">
                </div>
            </div>

            <div class="config-section">
                <div class="section-title">Premiação</div>
                
                <div class="total-prize">
                    <div>Total Arrecadado</div>
                    <div class="total-prize-value" id="totalPrize">R$ 960</div>
                </div>
                
                <div class="payout-list" id="payoutList">
                    <!-- Preenchido via JavaScript -->
                </div>

                <button class="structure-btn" onclick="addPayout()" style="width: 100%; margin-top: 15px;">
                    + Adicionar Posição
                </button>
            </div>
        </div>
    </div>

    <script>
        // Estado do jogo
        let gameState = {
            currentLevel: 1,
            timeLeft: 767, // 12:47
            totalTime: 7967, // 2:12:47
            isRunning: false,
            activePlayers: 16,
            totalPlayers: 16,
            eliminated: 0,
            buyin: 60,
            fee: 0,
            startingChips: 5000,
            tournamentName: "NOITE DOS FUNDADORES",
            currentTab: 'timer'
        };

        // Estrutura de blinds
        let structure = [
            { level: 1, sb: 25, bb: 50, ante: 0, duration: 15, type: 'normal' },
            { level: 2, sb: 25, bb: 50, ante: 0, duration: 15, type: 'normal' }, // atual
            { level: 3, sb: 30, bb: 60, ante: 0, duration: 15, type: 'normal' },
            { level: 4, sb: 40, bb: 80, ante: 0, duration: 15, type: 'normal' },
            { level: 5, sb: 50, bb: 100, ante: 0, duration: 15, type: 'normal' },
            { level: 6, sb: 60, bb: 120, ante: 0, duration: 15, type: 'normal' },
            { level: 7, sb: 75, bb: 150, ante: 0, duration: 15, type: 'normal' },
            { level: 0, sb: 0, bb: 0, ante: 0, duration: 15, type: 'break' }
        ];

        // Pagamentos (apenas percentuais)
        let payouts = [
            { pos: 1, percent: 40 },
            { pos: 2, percent: 30 },
            { pos: 3, percent: 20 },
            { pos: 4, percent: 10 }
        ];

        let timerId = null;
        let audioCtx = null;

        // Inicialização
        function init() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
            
            updateDisplay();
            renderStructureConfig();
            renderPayouts();
            loadState();
        }

        // Audio
        function beep(freq = 800, dur = 200, vol = 0.3) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur/1000);
            osc.start();
            osc.stop(audioCtx.currentTime + dur/1000);
        }

        // Timer
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function formatTotalTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            const level = structure[gameState.currentLevel];
            
            // Timer
            document.getElementById('mainTimer').textContent = formatTime(gameState.timeLeft);
            document.getElementById('totalTimer').textContent = formatTotalTime(gameState.totalTime);
            
            // Progress
            const progress = (gameState.timeLeft / (level.duration * 60)) * 100;
            document.getElementById('progressBar').style.width = Math.max(0, progress) + '%';
            
            // Warning
            const timer = document.getElementById('mainTimer');
            if (gameState.timeLeft <= 60) {
                timer.classList.add('warning');
            } else {
                timer.classList.remove('warning');
            }
            
            // Blinds
            if (level.type === 'break') {
                document.getElementById('currentSB').textContent = 'PAUSA';
                document.getElementById('currentBB').textContent = '';
                document.getElementById('currentAnte').style.display = 'none';
            } else {
                document.getElementById('currentSB').textContent = level.sb;
                document.getElementById('currentBB').textContent = level.bb;
                document.getElementById('currentAnte').value = level.ante;
                document.getElementById('currentAnte').style.display = 'block';
            }
            
            // Players
            gameState.activePlayers = gameState.totalPlayers - gameState.eliminated;
            document.getElementById('activePlayers').textContent = gameState.activePlayers;
            document.getElementById('totalPlayers').textContent = gameState.totalPlayers;
            
            // Average stack
            const totalChips = gameState.totalPlayers * gameState.startingChips;
            const avgStack = Math.round(totalChips / gameState.activePlayers);
            document.getElementById('avgStack').textContent = avgStack.toLocaleString();
            
            // Tournament info header
            const totalPrize = gameState.totalPlayers * gameState.buyin;
            document.getElementById('tournamentInfo').textContent = 
                `Buy-in: R$ ${gameState.buyin} | ${gameState.totalPlayers} Jogadores | Prize: R$ ${totalPrize}`;
            
            // Next levels
            renderNextLevels();
            
            // Break timer
            updateBreakTimer();
            
            // Update tournament inputs
            updateTournamentInputs();
            
            saveState();
        }

        function renderNextLevels() {
            const list = document.getElementById('nextLevels');
            list.innerHTML = '';
            
            for (let i = gameState.currentLevel; i < Math.min(gameState.currentLevel + 6, structure.length); i++) {
                const level = structure[i];
                const li = document.createElement('li');
                li.className = `next-level-item ${i === gameState.currentLevel ? 'current' : ''} ${level.type === 'break' ? 'break' : ''}`;
                li.onclick = () => goToLevel(i);
                
                if (level.type === 'break') {
                    li.innerHTML = `
                        <span class="level-num">☕</span>
                        <span class="level-blinds">INTERVALO</span>
                        <span class="level-time">${level.duration}m</span>
                    `;
                } else {
                    li.innerHTML = `
                        <span class="level-num">N${level.level}</span>
                        <span class="level-blinds">${level.sb} / ${level.bb}</span>
                        <span class="level-time">${level.duration}m</span>
                    `;
                }
                
                list.appendChild(li);
            }
        }

        function updateBreakTimer() {
            let levelsToBreak = 0;
            let timeToBreak = 0;
            
            for (let i = gameState.currentLevel + 1; i < structure.length; i++) {
                if (structure[i].type === 'break') {
                    levelsToBreak = i - gameState.currentLevel;
                    break;
                }
                timeToBreak += structure[i].duration;
            }
            
            if (levelsToBreak > 0) {
                document.getElementById('breakTimer').textContent = `${levelsToBreak} níveis (${timeToBreak} min)`;
            } else {
                document.getElementById('breakTimer').textContent = 'Não há';
            }
        }

        function goToLevel(index) {
            if (gameState.isRunning) {
                if (confirm('Pausar timer e ir para este nível?')) {
                    clearInterval(timerId);
                    gameState.isRunning = false;
                    document.getElementById('playBtn').textContent = '▶ Iniciar';
                } else {
                    return;
                }
            }
            
            gameState.currentLevel = index;
            gameState.timeLeft = structure[index].duration * 60;
            updateDisplay();
        }

        function tick() {
            gameState.timeLeft--;
            gameState.totalTime++;
            
            if (gameState.timeLeft <= 0) {
                nextLevel(true);
                return;
            }
            
            if (gameState.timeLeft === 60) {
                beep(440, 100);
            }
            
            updateDisplay();
        }

        function toggleTimer() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            gameState.isRunning = !gameState.isRunning;
            const btn = document.getElementById('playBtn');
            
            if (gameState.isRunning) {
                timerId = setInterval(tick, 1000);
                btn.textContent = '⏸ Pausar';
            } else {
                clearInterval(timerId);
                btn.textContent = '▶ Iniciar';
            }
        }

        function adjustTime(seconds) {
            gameState.timeLeft = Math.max(0, gameState.timeLeft + seconds);
            updateDisplay();
        }

        function nextLevel(auto = false) {
            if (gameState.currentLevel < structure.length - 1) {
                gameState.currentLevel++;
                gameState.timeLeft = structure[gameState.currentLevel].duration * 60;
                
                if (auto) {
                    setTimeout(() => beep(660, 150), 0);
                    setTimeout(() => beep(880, 150), 200);
                    setTimeout(() => beep(1100, 300), 400);
                }
                
                updateDisplay();
            }
        }

        function prevLevel() {
            if (gameState.currentLevel > 0) {
                gameState.currentLevel--;
                gameState.timeLeft = structure[gameState.currentLevel].duration * 60;
                updateDisplay();
            }
        }

        function updateCurrentAnte(value) {
            structure[gameState.currentLevel].ante = parseInt(value) || 0;
            saveState();
        }

        // Tabs
        function switchTab(tab) {
            // Remove active from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active to selected tab
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            gameState.currentTab = tab;
            saveState();
        }

        // Structure Config
        function renderStructureConfig() {
            const container = document.getElementById('structureList');
            container.innerHTML = '';
            
            structure.forEach((level, i) => {
                const div = document.createElement('div');
                div.className = `structure-item ${level.type === 'break' ? 'break' : ''}`;
                
                if (level.type === 'break') {
                    div.innerHTML = `
                        <div class="break-indicator">☕ INTERVALO ${i + 1}</div>
                        <div class="structure-form">
                            <div class="form-group">
                                <label class="form-label">Duração:</label>
                                <input type="number" class="form-input" value="${level.duration}" min="1" max="60" onchange="updateStructure(${i}, 'duration', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Ação:</label>
                                <button class="remove-btn" onclick="removeLevel(${i})">🗑 Remover</button>
                            </div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="structure-form">
                            <div class="form-group">
                                <label class="form-label">Nível:</label>
                                <input type="number" class="form-input" value="${level.level}" min="1" onchange="updateStructure(${i}, 'level', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Tempo (min):</label>
                                <input type="number" class="form-input" value="${level.duration}" min="1" max="120" onchange="updateStructure(${i}, 'duration', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Small:</label>
                                <input type="number" class="form-input" value="${level.sb}" min="1" onchange="updateStructure(${i}, 'sb', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Big:</label>
                                <input type="number" class="form-input" value="${level.bb}" min="1" onchange="updateStructure(${i}, 'bb', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Ante (opcional):</label>
                                <input type="number" class="form-input" value="${level.ante}" min="0" onchange="updateStructure(${i}, 'ante', this.value)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Ação:</label>
                                <button class="remove-btn" onclick="removeLevel(${i})">🗑 Remover</button>
                            </div>
                        </div>
                    `;
                }
                
                container.appendChild(div);
            });
        }

        function updateStructure(index, field, value) {
            structure[index][field] = parseInt(value) || 0;
            if (index === gameState.currentLevel && field === 'duration') {
                gameState.timeLeft = Math.min(gameState.timeLeft, parseInt(value) * 60);
            }
            updateDisplay();
        }

        function addLevel() {
            const newLevel = {
                level: structure.filter(s => s.type === 'normal').length + 1,
                sb: 100,
                bb: 200,
                ante: 0,
                duration: 15,
                type: 'normal'
            };
            structure.push(newLevel);
            renderStructureConfig();
        }

        function addBreak() {
            structure.push({
                level: 0, sb: 0, bb: 0, ante: 0, duration: 15, type: 'break'
            });
            renderStructureConfig();
        }

        function removeLevel(index) {
            if (structure.length <= 1) {
                alert('Deve ter pelo menos 1 nível!');
                return;
            }
            
            if (confirm('Remover este nível?')) {
                structure.splice(index, 1);
                if (gameState.currentLevel >= structure.length) {
                    gameState.currentLevel = structure.length - 1;
                }
                if (gameState.currentLevel >= index && gameState.currentLevel > 0) {
                    gameState.currentLevel--;
                }
                renderStructureConfig();
                updateDisplay();
            }
        }

        function resetStructure() {
            if (confirm('Resetar estrutura para o padrão?')) {
                structure = [
                    { level: 1, sb: 25, bb: 50, ante: 0, duration: 15, type: 'normal' },
                    { level: 2, sb: 30, bb: 60, ante: 0, duration: 15, type: 'normal' },
                    { level: 3, sb: 40, bb: 80, ante: 0, duration: 15, type: 'normal' },
                    { level: 4, sb: 50, bb: 100, ante: 0, duration: 15, type: 'normal' },
                    { level: 5, sb: 75, bb: 150, ante: 25, duration: 15, type: 'normal' },
                    { level: 0, sb: 0, bb: 0, ante: 0, duration: 10, type: 'break' },
                    { level: 6, sb: 100, bb: 200, ante: 25, duration: 15, type: 'normal' },
                    { level: 7, sb: 150, bb: 300, ante: 50, duration: 15, type: 'normal' }
                ];
                gameState.currentLevel = 0;
                renderStructureConfig();
                updateDisplay();
            }
        }

        function saveStructure() {
            alert('Estrutura salva com sucesso!');
            saveState();
        }

        // Tournament Settings
        function updateTournamentName() {
            gameState.tournamentName = document.getElementById('tournamentNameInput').value;
            document.querySelector('.tournament-title').textContent = gameState.tournamentName;
            updateDisplay();
        }

        function updateTournamentSettings() {
            gameState.totalPlayers = parseInt(document.getElementById('totalPlayersInput').value) || 16;
            gameState.eliminated = parseInt(document.getElementById('eliminatedInput').value) || 0;
            gameState.buyin = parseInt(document.getElementById('buyinInput').value) || 60;
            gameState.fee = parseInt(document.getElementById('feeInput').value) || 0;
            gameState.startingChips = parseInt(document.getElementById('startingChipsInput').value) || 5000;
            
            updateDisplay();
            renderPayouts();
        }

        function updateTournamentInputs() {
            document.getElementById('tournamentNameInput').value = gameState.tournamentName;
            document.getElementById('totalPlayersInput').value = gameState.totalPlayers;
            document.getElementById('eliminatedInput').value = gameState.eliminated;
            document.getElementById('buyinInput').value = gameState.buyin;
            document.getElementById('feeInput').value = gameState.fee;
            document.getElementById('startingChipsInput').value = gameState.startingChips;
        }

        // Payouts
        function renderPayouts() {
            const list = document.getElementById('payoutList');
            const totalPrize = gameState.totalPlayers * gameState.buyin;
            
            document.getElementById('totalPrize').textContent = `R$ ${totalPrize.toLocaleString()}`;
            
            list.innerHTML = '';
            
            payouts.forEach((p, i) => {
                const value = Math.round((totalPrize * p.percent) / 100);
                
                const div = document.createElement('div');
                div.className = 'payout-item';
                div.innerHTML = `
                    <div class="payout-pos">${p.pos}º lugar</div>
                    <input type="number" class="payout-percent" value="${p.percent}" min="0" max="100" onchange="updatePayout(${i}, 'percent', this.value)">
                    <div class="payout-value">R$ ${value.toLocaleString()}</div>
                    <button class="remove-btn" onclick="removePayout(${i})">×</button>
                `;
                list.appendChild(div);
            });
        }

        function updatePayout(index, field, value) {
            payouts[index][field] = parseInt(value) || 0;
            renderPayouts();
            saveState();
        }

        function addPayout() {
            payouts.push({
                pos: payouts.length + 1,
                percent: 5
            });
            renderPayouts();
        }

        function removePayout(index) {
            if (payouts.length <= 1) {
                alert('Deve ter pelo menos 1 posição premiada!');
                return;
            }
            
            if (confirm('Remover esta posição?')) {
                payouts.splice(index, 1);
                // Renumber positions
                payouts.forEach((p, i) => p.pos = i + 1);
                renderPayouts();
            }
        }

        // Editors
        function editPlayers() {
            const newTotal = prompt('Total de jogadores:', gameState.totalPlayers);
            if (newTotal && !isNaN(parseInt(newTotal))) {
                gameState.totalPlayers = Math.max(2, parseInt(newTotal));
                updateDisplay();
            }
        }

        function editTournamentName() {
            const newName = prompt('Nome do torneio:', gameState.tournamentName);
            if (newName && newName.trim()) {
                gameState.tournamentName = newName.trim();
                document.querySelector('.tournament-title').textContent = gameState.tournamentName;
                document.getElementById('tournamentNameInput').value = gameState.tournamentName;
                updateDisplay();
            }
        }

        // Storage
        function saveState() {
            localStorage.setItem('fpc-tournament', JSON.stringify({ gameState, structure, payouts }));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('fpc-tournament');
                if (saved) {
                    const data = JSON.parse(saved);
                    gameState = { ...gameState, ...data.gameState };
                    structure = data.structure || structure;
                    payouts = data.payouts || payouts;
                    
                    document.querySelector('.tournament-title').textContent = gameState.tournamentName;
                    
                    if (gameState.currentTab) {
                        switchTab(gameState.currentTab);
                    }
                    
                    renderStructureConfig();
                    renderPayouts();
                    updateDisplay();
                }
            } catch (e) {}
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (gameState.currentTab === 'timer') {
                if (e.code === 'Space') {
                    e.preventDefault();
                    toggleTimer();
                } else if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    nextLevel();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    prevLevel();
                }
            }
        });

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
